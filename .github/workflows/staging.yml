name: Deploy to EC2
on:
  push:
    branches:
      - staging
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2
      - name: Get Git Info
        id: vars
        run: |
          echo "BRANCH_NAME=${GITHUB_REF##*/}" >> $GITHUB_ENV
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "TAG=${{ env.IMAGE_NAME }}:${GITHUB_REF##*/}-$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - name: Setup SSH Directory
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
      - name: Add EC2 Host to Known Hosts
        run: |
          ssh-keyscan -H ${{ secrets.EC2_STAGING_HOST }} >> ~/.ssh/known_hosts
      - name: Prepare SSH Key
        run: |
          echo "${{ secrets.EC2_STAGING_KEY }}" > private_key.pem
          chmod 600 private_key.pem
      - name: Create target directory on EC2
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_STAGING_HOST }}
        run: |
          ssh -i private_key.pem $EC2_USER@$EC2_HOST "mkdir -p ~/staging/backend"
      - name: Transfer Files to EC2
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_STAGING_HOST }}
        run: |
          scp -i private_key.pem -r * $EC2_USER@$EC2_HOST:~/staging/backend
      - name: Build Docker Image on EC2
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_STAGING_HOST }}
          TAG: ${{ env.TAG }}
        run: |
          ssh -i private_key.pem $EC2_USER@$EC2_HOST << EOF
            cd ~/staging/backend
            sudo docker build -t ats-staging-be$TAG .
            sudo docker compose down ats-staging-be
            grep -q '^IMAGE_TAG=' .env && sed -i 's/^IMAGE_TAG=.*/IMAGE_TAG='"$TAG"'/' .env || echo IMAGE_TAG=$TAG >> .env
            sudo docker compose up ats-staging-be -d
          EOF
      - name: Cleanup
        run: |
          rm -f private_key.pem
